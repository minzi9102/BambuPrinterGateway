<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bambu Printer Admin</title>
    <link rel="stylesheet" href="/styles.css?v=queue-management-1">
  </head>
  <body>
    <main>
      <section>
        <h1>Admin</h1>
        <dl>
          <div>
            <dt>Status</dt>
            <dd id="printer-state">unknown</dd>
          </div>
          <div>
            <dt>Connected</dt>
            <dd id="printer-connected">false</dd>
          </div>
        </dl>
      </section>

      <section>
        <h2>Active Job</h2>
        <p id="active-job">No active job</p>
        <h2>Next Queued Job</h2>
        <p id="next-job">Queue empty</p>
        <h2 id="queue-heading">Queued Jobs</h2>
        <ol id="admin-queue" class="admin-queue" aria-labelledby="queue-heading"></ol>
        <div>
          <h3>AMS Slot</h3>
          <div id="ams-slots" class="ams-slots" role="radiogroup" aria-label="AMS Slot"></div>
        </div>
        <button id="start-next" type="button">Start Next Job</button>
        <p id="message" role="status"></p>
      </section>

      <section>
        <h2>Print History</h2>
        <ol id="history"></ol>
      </section>
    </main>
    <aside id="debug-panel" class="debug-panel" hidden>
      <div class="debug-header">
        <strong>Debug</strong>
        <button id="debug-refresh" type="button">Refresh Debug</button>
      </div>
      <p id="debug-updated"></p>
      <pre id="debug-output"></pre>
    </aside>
    <button id="debug-toggle" class="debug-toggle" type="button">Debug</button>
    <script src="/admin.js?v=queue-management-1"></script>
  </body>
</html>

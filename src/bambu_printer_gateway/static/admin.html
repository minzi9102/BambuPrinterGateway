<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bambu Printer Admin</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main>
      <section>
        <h1>Admin</h1>
        <dl>
          <div>
            <dt>Status</dt>
            <dd id="printer-state">unknown</dd>
          </div>
          <div>
            <dt>Connected</dt>
            <dd id="printer-connected">false</dd>
          </div>
        </dl>
      </section>

      <section>
        <h2>Next Job</h2>
        <p id="next-job">None</p>
        <label>
          AMS Slot
          <select id="ams-slot"></select>
        </label>
        <button id="start-next" type="button">Start Next Job</button>
        <p id="message" role="status"></p>
      </section>
    </main>
    <aside id="debug-panel" class="debug-panel" hidden>
      <div class="debug-header">
        <strong>Debug</strong>
        <button id="debug-refresh" type="button">Refresh Debug</button>
      </div>
      <p id="debug-updated"></p>
      <pre id="debug-output"></pre>
    </aside>
    <button id="debug-toggle" class="debug-toggle" type="button">Debug</button>
    <script src="/admin.js"></script>
  </body>
</html>

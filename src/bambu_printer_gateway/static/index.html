<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D 打印队列</title>
    <link rel="stylesheet" href="/styles.css?v=queue-dashboard-2">
  </head>
  <body class="queue-page">
    <main class="queue-dashboard">
      <header class="queue-header">
        <div class="queue-header-main">
          <div>
            <p class="queue-eyebrow">Bambu Printer Gateway</p>
            <h1>3D 打印队列</h1>
            <p class="queue-subtitle">查看实时状态、等待队列并提交打印任务</p>
          </div>
          <div class="printer-badges" aria-label="打印机概览">
            <div id="printer-state-badge" class="printer-badge">
              <span>打印机状态</span>
              <strong id="printer-state">未知</strong>
            </div>
            <div id="printer-connected-badge" class="printer-badge">
              <span>连接状态</span>
              <strong id="printer-connected">未连接</strong>
            </div>
          </div>
        </div>
        <dl class="metric-grid header-metrics">
          <div>
            <dt>喷嘴温度</dt>
            <dd id="printer-nozzle">—</dd>
          </div>
          <div>
            <dt>热床温度</dt>
            <dd id="printer-bed">—</dd>
          </div>
          <div>
            <dt>腔体温度</dt>
            <dd id="printer-chamber">—</dd>
          </div>
          <div class="icon-metric">
            <dt>风扇状态</dt>
            <dd>
              <span id="printer-fan-status" class="status-icon fan-status" data-state="unknown" role="img" aria-label="风扇状态未知" title="风扇状态未知">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3c3 0 4.6 2.5 3.2 5.1L13.6 11H12V3Z"></path>
                  <path d="M12 3c3 0 4.6 2.5 3.2 5.1L13.6 11H12V3Z" transform="rotate(90 12 12)"></path>
                  <path d="M12 3c3 0 4.6 2.5 3.2 5.1L13.6 11H12V3Z" transform="rotate(180 12 12)"></path>
                  <path d="M12 3c3 0 4.6 2.5 3.2 5.1L13.6 11H12V3Z" transform="rotate(270 12 12)"></path>
                  <circle cx="12" cy="12" r="2.2"></circle>
                </svg>
              </span>
            </dd>
          </div>
          <div class="icon-metric">
            <dt>Wi-Fi 信号</dt>
            <dd>
              <span id="printer-wifi-status" class="status-icon wifi-status" data-level="0" role="img" aria-label="Wi-Fi 信号未知" title="Wi-Fi 信号未知">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path class="wifi-wave wifi-wave-3" d="M3 9a14 14 0 0 1 18 0"></path>
                  <path class="wifi-wave wifi-wave-2" d="M6.5 12.5a9 9 0 0 1 11 0"></path>
                  <path class="wifi-wave wifi-wave-1" d="M9.5 16a4 4 0 0 1 5 0"></path>
                  <circle class="wifi-dot" cx="12" cy="19" r="1.5"></circle>
                </svg>
              </span>
            </dd>
          </div>
        </dl>
      </header>

      <p id="offline-notice" class="notice" hidden>
        <strong>打印机离线</strong>
        <span>暂时无法开始打印，现有队列已保留。</span>
      </p>

      <div class="dashboard-grid">
        <section class="dashboard-card current-print-card">
          <div class="card-heading">
            <div>
              <p class="card-kicker">实时状态</p>
              <h2>当前打印</h2>
            </div>
            <span id="current-phase" class="phase-badge">无任务</span>
          </div>
          <p id="current-job" class="current-job">暂无活动任务</p>
          <div class="progress-heading">
            <span>打印进度</span>
            <strong id="printer-progress">—</strong>
          </div>
          <progress id="printer-progress-bar" max="100" value="0" aria-label="打印进度"></progress>
          <dl class="print-details">
            <div class="print-task">
              <dt>打印文件</dt>
              <dd id="printer-task">—</dd>
            </div>
            <div>
              <dt>剩余时间</dt>
              <dd id="printer-remaining">—</dd>
            </div>
            <div>
              <dt>当前层数</dt>
              <dd id="printer-layer">—</dd>
            </div>
          </dl>
        </section>

        <section class="dashboard-card queue-card">
          <div class="card-heading">
            <div>
              <p class="card-kicker">即将打印</p>
              <h2>等待队列</h2>
            </div>
            <span id="queue-count" class="count-badge">0 个任务</span>
          </div>
          <ol id="queue" class="task-list scroll-list"></ol>
        </section>

        <section class="dashboard-card ams-card">
          <div class="card-heading">
            <div>
              <p class="card-kicker">材料状态</p>
              <h2>AMS 材料</h2>
            </div>
          </div>
          <div id="ams-status" class="ams-status"></div>
        </section>

        <section class="dashboard-card submit-card">
          <div class="card-heading">
            <div>
              <p class="card-kicker">加入队列</p>
              <h2>提交打印任务</h2>
            </div>
          </div>
          <form id="job-form">
            <label>
              姓名
              <input name="display_name" autocomplete="name" required>
            </label>
            <label>
              项目名称
              <input name="project_name" required>
            </label>
            <label>
              打印文件
              <input name="file" type="file" accept=".3mf,.gcode.3mf" required>
            </label>
            <button type="submit">加入打印队列</button>
          </form>
          <p id="message" role="status"></p>
        </section>

        <section class="dashboard-card history-card">
          <div class="card-heading">
            <div>
              <p class="card-kicker">最近记录</p>
              <h2>打印历史</h2>
            </div>
          </div>
          <ol id="history" class="history-list scroll-list"></ol>
        </section>
      </div>
    </main>
    <script src="/app.js?v=queue-dashboard-2"></script>
  </body>
</html>
